<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Badges & pills</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .pill { font-family: var(--font-ui); font-weight: 700; font-size: 12px; letter-spacing: 0.02em; padding: 6px 12px; border-radius: 999px; display: inline-flex; align-items: center; gap: 6px; }
  .pill .dot { width: 7px; height: 7px; border-radius: 999px; background: currentColor; }
  .b-teal { background: var(--mt-teal-100); color: var(--mt-ocean-700); }
  .b-green { background: #E6F5DC; color: #2E6E14; }
  .b-yellow { background: #FFF3D1; color: #8A5A00; }
  .b-navy { background: var(--mt-navy); color: white; }
  .b-outline { border: 1.5px solid var(--mt-navy); color: var(--mt-navy); padding: 4px 10px; }
  .b-danger { background: #FBE6E7; color: #B81E22; }
  .label { font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-tertiary); width: 100%; margin-top: 4px; font-weight: 700; }
</style>
</head>
<body>
<div class="card">
  <div class="label">Status</div>
  <div class="row">
    <span class="pill b-green"><span class="dot"></span> Confirmed</span>
    <span class="pill b-yellow"><span class="dot"></span> Awaiting visit</span>
    <span class="pill b-teal"><span class="dot"></span> In progress</span>
    <span class="pill b-danger"><span class="dot"></span> Rescheduled</span>
  </div>
  <div class="label">Tags & callouts</div>
  <div class="row">
    <span class="pill b-navy">New</span>
    <span class="pill b-outline">Eco supplies</span>
    <span class="pill b-teal">Vacation rental</span>
    <span class="pill" style="background:var(--mt-yellow); color:var(--mt-navy)">Top franchisee 2026</span>
  </div>
</div>
</body>
</html>
