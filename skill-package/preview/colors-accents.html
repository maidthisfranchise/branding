<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Colors — Accents</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; flex: 1; }
  .swatch {
    border-radius: 14px;
    padding: 18px 16px 16px;
    display: flex; flex-direction: column; justify-content: space-between;
    min-height: 150px;
  }
  .swatch .name { font-family: var(--font-display); font-weight: 800; font-size: 18px; line-height: 1.1; }
  .swatch .hex  { font-family: var(--font-ui); font-size: 12px; letter-spacing: var(--ls-wide); font-weight: 600; opacity: 0.9; }
  .swatch .role { font-family: var(--font-ui); font-size: 10px; letter-spacing: var(--ls-caps); text-transform: uppercase; opacity: 0.75; margin-top: 8px; }
  .swatch .use { font-family: var(--font-ui); font-size: 11px; opacity: 0.8; margin-top: 4px; }
  .on-light { color: var(--mt-navy); }
  .on-dark  { color: var(--mt-white); }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="swatch on-dark" style="background:#7CCA5B">
      <div class="role">Accent</div>
      <div>
        <div class="name">Fresh Green</div>
        <div class="hex">#7CCA5B</div>
        <div class="use">Success, confirmation, "book now"</div>
      </div>
    </div>
    <div class="swatch on-light" style="background:#FFB600">
      <div class="role">Accent</div>
      <div>
        <div class="name">Bold Yellow</div>
        <div class="hex">#FFB600</div>
        <div class="use">Highlights, callouts, promo</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
