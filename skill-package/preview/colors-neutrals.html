<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Colors — Neutrals</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; flex: 1; }
  .swatch {
    border-radius: 14px;
    padding: 18px 16px 16px;
    display: flex; flex-direction: column; justify-content: space-between;
    min-height: 150px;
  }
  .swatch .name { font-family: var(--font-display); font-weight: 800; font-size: 18px; line-height: 1.1; }
  .swatch .hex  { font-family: var(--font-ui); font-size: 12px; letter-spacing: var(--ls-wide); font-weight: 600; opacity: 0.9; }
  .swatch .role { font-family: var(--font-ui); font-size: 10px; letter-spacing: var(--ls-caps); text-transform: uppercase; opacity: 0.75; margin-top: 8px; }
  .on-light { color: var(--mt-navy); }
  .on-dark  { color: var(--mt-white); }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="swatch on-dark" style="background:#2C3E50">
      <div class="role">Neutral</div>
      <div>
        <div class="name">Charcoal Navy</div>
        <div class="hex">#2C3E50</div>
      </div>
    </div>
    <div class="swatch on-light" style="background:#E6F1F4; border: 1px solid var(--border-subtle)">
      <div class="role">Neutral</div>
      <div>
        <div class="name">Cool Gray</div>
        <div class="hex">#E6F1F4</div>
      </div>
    </div>
    <div class="swatch on-light" style="background:#FFFFFF; border: 1px solid var(--border-subtle)">
      <div class="role">Neutral</div>
      <div>
        <div class="name">White</div>
        <div class="hex">#FFFFFF</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
