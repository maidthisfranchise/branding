<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Colors — Primary</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; flex: 1; }
  .swatch {
    border-radius: 14px;
    padding: 18px 16px 16px;
    display: flex; flex-direction: column; justify-content: space-between;
    min-height: 160px;
    position: relative; overflow: hidden;
  }
  .swatch .name { font-family: var(--font-display); font-weight: 800; font-size: 18px; line-height: 1.1; }
  .swatch .hex  { font-family: var(--font-ui); font-size: 12px; letter-spacing: var(--ls-wide); font-weight: 600; opacity: 0.9; }
  .swatch .role { font-family: var(--font-ui); font-size: 10px; letter-spacing: var(--ls-caps); text-transform: uppercase; opacity: 0.75; margin-top: 8px; font-weight: 700; }
  .on-light { color: var(--mt-navy); }
  .on-dark  { color: var(--mt-white); }

  .backups { display: flex; gap: 10px; }
  .mini {
    flex: 1; border-radius: 10px; padding: 10px 12px;
    display: flex; flex-direction: column; gap: 2px; min-height: 60px;
    border: 1px solid var(--border-subtle);
  }
  .mini .n { font-family: var(--font-display); font-weight: 800; font-size: 12px; }
  .mini .h { font-family: var(--font-ui); font-size: 10px; font-weight: 600; opacity: 0.85; }
  .mini .r { font-family: var(--font-ui); font-size: 9px; letter-spacing: var(--ls-caps); text-transform: uppercase; opacity: 0.7; font-weight: 700; }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="swatch on-dark" style="background:#5AB3C9">
      <div class="role">Dominant · 01</div>
      <div>
        <div class="name">Teal Blue</div>
        <div class="hex">#5AB3C9</div>
      </div>
    </div>
    <div class="swatch on-light" style="background:#FFFFFF; border: 1px solid var(--border-default)">
      <div class="role">Dominant · 02</div>
      <div>
        <div class="name">White</div>
        <div class="hex">#FFFFFF</div>
      </div>
    </div>
    <div class="swatch on-dark" style="background:#0F1821">
      <div class="role">Dominant · 03</div>
      <div>
        <div class="name">Black</div>
        <div class="hex">#0F1821</div>
      </div>
    </div>
  </div>

  <div class="backups">
    <div class="mini on-dark" style="background:#0C85C2; border-color:#0C85C2">
      <div class="r">Backup</div>
      <div class="n">Ocean Blue</div>
      <div class="h">#0C85C2</div>
    </div>
    <div class="mini on-light" style="background:#A7DBE7; border-color:#A7DBE7">
      <div class="r">Backup</div>
      <div class="n">Aqua Mist</div>
      <div class="h">#A7DBE7</div>
    </div>
  </div>
</div>
</body>
</html>
