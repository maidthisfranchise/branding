<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Colors — Scales</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; gap: 6px; }
  .scale-row { flex: 1; display: flex; gap: 6px; }
  .chip {
    flex: 1; border-radius: 8px;
    aspect-ratio: 1 / 1;
    display: flex; align-items: flex-end; padding: 6px 8px;
    font-family: var(--font-ui); font-size: 9px; font-weight: 700;
    letter-spacing: var(--ls-wide);
  }
  .label { width: 86px; font-family: var(--font-ui); font-size: 11px; font-weight: 700; display: flex; align-items: center; color: var(--fg-secondary); }
  .on-dark { color: var(--mt-white); }
  .on-light { color: var(--mt-navy); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="label">Teal</div>
    <div class="scale-row">
      <div class="chip on-light" style="background:#EAF6F9">100</div>
      <div class="chip on-light" style="background:#C6E6ED">200</div>
      <div class="chip on-light" style="background:#9CD3DE">300</div>
      <div class="chip on-dark"  style="background:#7AC3D2">400</div>
      <div class="chip on-dark"  style="background:#5AB3C9">500</div>
      <div class="chip on-dark"  style="background:#3E95AC">600</div>
      <div class="chip on-dark"  style="background:#2B7387">700</div>
      <div class="chip on-dark"  style="background:#1E5464">800</div>
    </div>
  </div>
  <div class="row">
    <div class="label">Ocean</div>
    <div class="scale-row">
      <div class="chip on-light" style="background:#E1F1FA">100</div>
      <div class="chip on-light" style="background:#A9D6EE">200</div>
      <div class="chip on-dark"  style="background:#6EB8DE">300</div>
      <div class="chip on-dark"  style="background:#0C85C2">500</div>
      <div class="chip on-dark"  style="background:#085E8A">700</div>
    </div>
  </div>
  <div class="row">
    <div class="label">Navy</div>
    <div class="scale-row">
      <div class="chip on-light" style="background:#E9ECF0">100</div>
      <div class="chip on-dark"  style="background:#8A9AAB">300</div>
      <div class="chip on-dark"  style="background:#2C3E50">500</div>
      <div class="chip on-dark"  style="background:#1C2A38">700</div>
    </div>
  </div>
</div>
</body>
</html>
