<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Colors — Semantic</title>
<link rel="stylesheet" href="_card.css">
<style>
  .list { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .item {
    display: grid; grid-template-columns: 80px 1fr 110px; gap: 14px; align-items: center;
    padding: 8px 10px; border-radius: 10px; background: var(--bg-soft);
  }
  .tok { font-family: var(--font-mono); font-size: 12px; color: var(--fg-secondary); }
  .name { font-family: var(--font-ui); font-weight: 700; font-size: 13px; color: var(--fg-primary); }
  .sample { border-radius: 6px; height: 28px; border: 1px solid var(--border-subtle); }
</style>
</head>
<body>
<div class="card">
  <div class="list">
    <div class="item"><div class="sample" style="background:var(--bg-page)"></div><div class="name">bg/page</div><div class="tok">#FFFFFF</div></div>
    <div class="item"><div class="sample" style="background:var(--bg-muted)"></div><div class="name">bg/muted</div><div class="tok">#E6F1F4</div></div>
    <div class="item"><div class="sample" style="background:var(--bg-inverse)"></div><div class="name">bg/inverse</div><div class="tok">#2C3E50</div></div>
    <div class="item"><div class="sample" style="background:var(--bg-brand)"></div><div class="name">bg/brand</div><div class="tok">#5AB3C9</div></div>
    <div class="item"><div class="sample" style="background:var(--bg-accent-mist)"></div><div class="name">bg/accent-mist</div><div class="tok">#A7DBE7</div></div>
    <div class="item"><div class="sample" style="background:var(--state-success)"></div><div class="name">state/success</div><div class="tok">#7CCA5B</div></div>
    <div class="item"><div class="sample" style="background:var(--state-warning)"></div><div class="name">state/warning</div><div class="tok">#FFB600</div></div>
    <div class="item"><div class="sample" style="background:var(--state-danger)"></div><div class="name">state/danger</div><div class="tok">#E5484D</div></div>
  </div>
</div>
</body>
</html>
