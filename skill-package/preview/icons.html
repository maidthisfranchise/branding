<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Iconography</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; gap: 18px; flex: 1; align-items: center; justify-content: space-around; padding: 6px 4px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ic svg { width: 30px; height: 30px; color: var(--mt-navy); stroke-width: 1.75; }
  .t { font-family: var(--font-ui); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 700; }
  .note { font-family: var(--font-body); font-size: 12px; color: var(--fg-secondary); border-top: 1px dashed var(--border-subtle); padding-top: 10px; }
  .sparkle { color: var(--mt-teal); fill: var(--mt-teal); }
</style>
<script src="https://unpkg.com/lucide@0.454.0"></script>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="ic"><i data-lucide="home"></i><div class="t">home</div></div>
    <div class="ic"><i data-lucide="sparkles" class="sparkle"></i><div class="t">sparkles</div></div>
    <div class="ic"><i data-lucide="calendar-check"></i><div class="t">calendar</div></div>
    <div class="ic"><i data-lucide="map-pin"></i><div class="t">map-pin</div></div>
    <div class="ic"><i data-lucide="clipboard-check"></i><div class="t">clipboard</div></div>
    <div class="ic"><i data-lucide="star"></i><div class="t">star</div></div>
    <div class="ic"><i data-lucide="leaf"></i><div class="t">leaf</div></div>
    <div class="ic"><i data-lucide="phone"></i><div class="t">phone</div></div>
  </div>
  <div class="note">Lucide @ 1.75 stroke · outline style · navy on light. Brand "sparkle" motif from the logo is reserved for highlights — use teal fill.</div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
