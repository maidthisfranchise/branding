<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Logo — Primary</title>
<link rel="stylesheet" href="_card.css">
<style>
  .stage {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 14px;
    flex: 1;
  }
  .panel {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    padding: 24px;
    min-height: 180px;
  }
  .panel.light { background: var(--mt-white); border: 1px solid var(--border-subtle); }
  .panel.dark  { background: var(--mt-navy); }
  .panel img { max-width: 100%; max-height: 120px; display: block; }
  .caption {
    position: absolute;
    font-family: var(--font-ui);
    font-size: 10px;
    letter-spacing: var(--ls-caps);
    text-transform: uppercase;
    color: var(--fg-tertiary);
    padding: 6px 10px;
  }
  .panel { position: relative; }
  .panel.dark .caption { color: rgba(255,255,255,0.6); }
</style>
</head>
<body>
<div class="card">
  <div class="stage">
    <div class="panel light">
      <span class="caption">On white</span>
      <img src="../assets/logos/maidthis-primary.png" alt="MaidThis logo">
    </div>
    <div class="panel dark">
      <span class="caption">On navy — use white/black variant</span>
      <img src="../assets/logos/maidthis-primary.png" alt="MaidThis logo" style="filter:brightness(0) invert(1)">
    </div>
  </div>
</div>
</body>
</html>
