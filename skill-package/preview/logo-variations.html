<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Logo — Variations</title>
<link rel="stylesheet" href="_card.css">
<style>
  .stage { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex: 1; }
  .cell {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; border-radius: 12px; padding: 18px 12px;
    min-height: 160px;
  }
  .cell.a { background: var(--mt-white); border: 1px solid var(--border-subtle); }
  .cell.b { background: var(--mt-gray); }
  .cell.c { background: var(--mt-navy); }
  .cell img { max-height: 86px; max-width: 100%; }
  .label {
    font-family: var(--font-ui); font-size: 10px; letter-spacing: var(--ls-caps);
    text-transform: uppercase; color: var(--fg-tertiary);
  }
  .cell.c .label { color: rgba(255,255,255,0.55); }
</style>
</head>
<body>
<div class="card">
  <div class="stage">
    <div class="cell a">
      <img src="../assets/logos/maidthis-primary.png">
      <div class="label">Primary lockup</div>
    </div>
    <div class="cell b">
      <img src="../assets/logos/maidthis-mark.png">
      <div class="label">House mark</div>
    </div>
    <div class="cell c">
      <img src="../assets/logos/maidthis-primary.png" style="filter:brightness(0) invert(1)">
      <div class="label">Reversed (white)</div>
    </div>
  </div>
</div>
</body>
</html>
