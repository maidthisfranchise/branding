<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Brand patterns</title>
<link rel="stylesheet" href="_card.css">
<style>
  .stage { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; flex: 1; }
  .block { border-radius: 12px; padding: 16px; min-height: 170px; display: flex; align-items: flex-end; position: relative; overflow: hidden; }
  .b1 { background: var(--mt-teal); color: white; }
  .b2 { background: var(--mt-navy); color: white; }
  .b3 { background: var(--mt-aqua); color: var(--mt-navy); }
  .h { font-family: var(--font-display); font-weight: 800; font-size: 17px; line-height: 1.1; letter-spacing: -0.01em; text-wrap: balance; }
  .sparkle { position: absolute; opacity: 0.9; }
  .s1 { top: 14px; left: 16px; width: 30px; }
  .s2 { top: 22px; right: 18px; width: 18px; }
  .dots { position: absolute; inset: 0; background-image: radial-gradient(var(--mt-teal) 1.2px, transparent 1.2px); background-size: 14px 14px; opacity: 0.35; }
  .accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: var(--mt-yellow); }
</style>
</head>
<body>
<div class="card">
  <div class="stage">
    <div class="block b1">
      <svg class="sparkle s1" viewBox="0 0 24 24" fill="white"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z"/></svg>
      <svg class="sparkle s2" viewBox="0 0 24 24" fill="white"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z"/></svg>
      <div class="h">Sparkle motif<br>on teal solid</div>
    </div>
    <div class="block b2">
      <div class="accent-bar"></div>
      <div class="h" style="color:var(--mt-teal)">Yellow accent<br>on navy</div>
    </div>
    <div class="block b3">
      <div class="dots"></div>
      <div class="h">Dot texture<br>on aqua mist</div>
    </div>
  </div>
</div>
</body>
</html>
