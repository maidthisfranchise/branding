<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; flex: 1; align-items: end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 70px; height: 70px; background: var(--mt-aqua); border: 2px solid var(--mt-teal); }
  .t { font-family: var(--font-mono); font-size: 11px; color: var(--fg-primary); font-weight: 700; }
  .s { font-family: var(--font-ui); font-size: 10px; color: var(--fg-tertiary); }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="t">r-sm</div><div class="s">6</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="t">r-md</div><div class="s">10</div></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><div class="t">r-lg</div><div class="s">14</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="t">r-xl</div><div class="s">20</div></div>
    <div class="item"><div class="box" style="border-radius:28px"></div><div class="t">r-2xl</div><div class="s">28</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="t">r-pill</div><div class="s">full</div></div>
  </div>
</div>
</body>
</html>
