<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Shadows / elevation</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; flex: 1; padding: 8px 4px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 96px; height: 68px; background: var(--mt-white); border-radius: 12px; border: 1px solid var(--border-subtle); }
  .t { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--fg-primary); }
  .s { font-family: var(--font-ui); font-size: 10px; color: var(--fg-tertiary); text-align: center; }
</style>
</head>
<body>
<div class="card" style="background:var(--bg-soft)">
  <div class="grid">
    <div class="item"><div class="box" style="box-shadow:0 1px 2px rgba(44,62,80,0.06)"></div><div class="t">shadow-xs</div><div class="s">rest</div></div>
    <div class="item"><div class="box" style="box-shadow:0 2px 6px rgba(44,62,80,0.08)"></div><div class="t">shadow-sm</div><div class="s">cards</div></div>
    <div class="item"><div class="box" style="box-shadow:0 8px 24px rgba(44,62,80,0.10)"></div><div class="t">shadow-md</div><div class="s">hover</div></div>
    <div class="item"><div class="box" style="box-shadow:0 20px 48px rgba(44,62,80,0.14)"></div><div class="t">shadow-lg</div><div class="s">modal</div></div>
  </div>
</div>
</body>
</html>
