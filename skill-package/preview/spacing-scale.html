<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  .list { display: flex; flex-direction: column; gap: 6px; flex: 1; justify-content: center; }
  .row { display: grid; grid-template-columns: 60px 80px 1fr; gap: 14px; align-items: center; font-family: var(--font-mono); font-size: 12px; color: var(--fg-secondary); }
  .token { color: var(--fg-primary); font-weight: 700; }
  .bar { height: 10px; background: var(--mt-teal); border-radius: 3px; }
</style>
</head>
<body>
<div class="card">
  <div class="list">
    <div class="row"><div class="token">sp-1</div><div>4px</div><div class="bar" style="width:4px"></div></div>
    <div class="row"><div class="token">sp-2</div><div>8px</div><div class="bar" style="width:8px"></div></div>
    <div class="row"><div class="token">sp-3</div><div>12px</div><div class="bar" style="width:12px"></div></div>
    <div class="row"><div class="token">sp-4</div><div>16px</div><div class="bar" style="width:16px"></div></div>
    <div class="row"><div class="token">sp-6</div><div>24px</div><div class="bar" style="width:24px"></div></div>
    <div class="row"><div class="token">sp-8</div><div>32px</div><div class="bar" style="width:32px"></div></div>
    <div class="row"><div class="token">sp-12</div><div>48px</div><div class="bar" style="width:48px"></div></div>
    <div class="row"><div class="token">sp-16</div><div>64px</div><div class="bar" style="width:64px"></div></div>
    <div class="row"><div class="token">sp-24</div><div>96px</div><div class="bar" style="width:96px"></div></div>
  </div>
</div>
</body>
</html>
