<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Type — Display</title>
<link rel="stylesheet" href="_card.css">
<style>
  .stack { display: flex; flex-direction: column; gap: 6px; flex: 1; justify-content: center; }
  .specimen { font-family: var(--font-display); font-weight: 800; color: var(--fg-primary); line-height: 0.95; letter-spacing: -0.02em; }
  .d1 { font-size: 64px; }
  .d2 { font-size: 40px; color: var(--mt-ocean); }
  .meta { font-family: var(--font-ui); font-size: 11px; color: var(--fg-tertiary); letter-spacing: var(--ls-caps); text-transform: uppercase; margin-top: 8px; }
</style>
</head>
<body>
<div class="card">
  <div class="stack">
    <div class="specimen d1">CLEAN. BOLD. DONE.</div>
    <div class="specimen d2">Montserrat ExtraBold</div>
    <div class="meta">Display 1 · 64/0.95 · -2% tracking · weight 800</div>
  </div>
</div>
</body>
</html>
