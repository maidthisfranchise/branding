<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Type — Font families</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; flex: 1; }
  .fam { border-radius: 12px; background: var(--bg-soft); border: 1px solid var(--border-subtle); padding: 14px; display: flex; flex-direction: column; gap: 4px; }
  .name { font-family: var(--font-display); font-weight: 800; font-size: 20px; color: var(--fg-primary); }
  .role { font-family: var(--font-ui); font-size: 10px; letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--mt-ocean); font-weight: 700; }
  .abc { font-size: 22px; margin-top: 4px; color: var(--fg-primary); }
  .abc.mont { font-family: 'Montserrat'; font-weight: 800; }
  .abc.os   { font-family: 'Open Sans'; font-weight: 400; }
  .weights { font-size: 11px; color: var(--fg-secondary); font-family: var(--font-ui); }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="fam">
      <div class="role">Display / UI</div>
      <div class="name">Montserrat</div>
      <div class="abc mont">Aa Bb Cc · 0123</div>
      <div class="weights">400 · 600 · 700 · <b>800 ExtraBold</b> · 900</div>
    </div>
    <div class="fam">
      <div class="role">Body</div>
      <div class="name" style="font-family:'Open Sans'; font-weight:700">Open Sans</div>
      <div class="abc os">Aa Bb Cc · 0123</div>
      <div class="weights">400 Regular · 600 · 700</div>
    </div>
  </div>
</div>
</body>
</html>
