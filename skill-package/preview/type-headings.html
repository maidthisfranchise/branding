<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Type — Headings</title>
<link rel="stylesheet" href="_card.css">
<style>
  .stack { display: flex; flex-direction: column; gap: 10px; flex: 1; justify-content: center; }
  .row { display: flex; gap: 16px; align-items: baseline; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); width: 60px; padding-top: 6px; }
  .h1 { font-family: var(--font-display); font-weight: 800; font-size: 36px; line-height: 1.05; letter-spacing: -0.02em; }
  .h2 { font-family: var(--font-display); font-weight: 800; font-size: 26px; line-height: 1.1; letter-spacing: -0.01em; }
  .h3 { font-family: var(--font-display); font-weight: 700; font-size: 20px; line-height: 1.15; }
  .h4 { font-family: var(--font-display); font-weight: 700; font-size: 16px; line-height: 1.2; }
</style>
</head>
<body>
<div class="card">
  <div class="stack">
    <div class="row"><div class="label">H1 · 48</div><div class="h1">Sparkling floors. No sparkling effort.</div></div>
    <div class="row"><div class="label">H2 · 36</div><div class="h2">Your home, handled.</div></div>
    <div class="row"><div class="label">H3 · 24</div><div class="h3">Tuesday cleanings now open.</div></div>
    <div class="row"><div class="label">H4 · 20</div><div class="h4">What's included in a Deep Clean</div></div>
  </div>
</div>
</body>
</html>
