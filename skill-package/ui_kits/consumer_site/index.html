<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>MaidThis — Consumer Booking</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { font-family: var(--font-body); color: var(--fg-primary); background: white; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ServiceGrid.jsx"></script>
<script type="text/babel" src="HowItWorks.jsx"></script>
<script type="text/babel" src="Testimonials.jsx"></script>
<script type="text/babel" src="CTABanner.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="BookingFlow.jsx"></script>
<script type="text/babel">
  const { useState } = React;
  function App() {
    const [bookOpen, setBookOpen] = useState(false);
    const [zip, setZip] = useState('');
    const openBooking = (z) => { if (z) setZip(z); setBookOpen(true); };
    return (
      <>
        <Header />
        <Hero onBook={openBooking} />
        <ServiceGrid />
        <HowItWorks />
        <Testimonials />
        <CTABanner onBook={() => setBookOpen(true)} />
        <Footer />
        <BookingFlow open={bookOpen} initialZip={zip} onClose={() => setBookOpen(false)} />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
