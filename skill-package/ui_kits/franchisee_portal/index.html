<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>MaidThis — Franchisee Portal</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-soft); }
  * { box-sizing: border-box; }
  body { font-family: var(--font-body); color: var(--fg-primary); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel" src="JobCard.jsx"></script>
<script type="text/babel" src="DashboardView.jsx"></script>
<script type="text/babel" src="ScheduleView.jsx"></script>
<script type="text/babel" src="TeamView.jsx"></script>
<script type="text/babel" src="BookingDrawer.jsx"></script>
<script type="text/babel">
  const { useState } = React;
  function App() {
    const [view, setView] = useState('dashboard');
    const [openJob, setOpenJob] = useState(null);
    const titles = {
      dashboard: ['Dashboard', 'Tuesday, April 28 · 12 bookings today'],
      schedule:  ['Schedule',  'Plan, reassign, reschedule — without the spreadsheets.'],
      team:      ['Team',      'Your cleaners, ranked and (gently) accountable.'],
      bookings:  ['Bookings',  'All visits in one place.'],
      customers: ['Customers', 'The folks paying the bills.'],
      reports:   ['Reports',   'Numbers that actually mean something.']
    };
    return (
      <div style={{display:'flex', minHeight:'100vh'}}>
        <Sidebar active={view} onNav={setView} />
        <main style={{flex:1, display:'flex', flexDirection:'column'}}>
          <TopBar title={titles[view][0]} subtitle={titles[view][1]} />
          {view === 'dashboard' && <DashboardView onOpenJob={setOpenJob} />}
          {view === 'schedule'  && <ScheduleView />}
          {view === 'team'      && <TeamView />}
          {(view === 'bookings' || view === 'customers' || view === 'reports') && (
            <div style={{padding:48, textAlign:'center', color:'var(--fg-tertiary)', fontFamily:'var(--font-display)', fontWeight:700}}>
              — {titles[view][0]} view coming soon —
            </div>
          )}
        </main>
        <BookingDrawer job={openJob} onClose={() => setOpenJob(null)} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
